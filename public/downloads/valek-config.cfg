// ============================================================
//  ValeK — CS2 config
//  Launch options:
//  -high -novid -noreflex +rate 1000000 -allow_third_party_software +fps_max 0
// ============================================================

// Mouse / sensitivity
sensitivity "1.4"
m_yaw "0.022"
zoom_sensitivity_ratio "1"
m_rawinput "1"
// DPI 400 / Rate 4000 Hz / Acceleration off are set in mouse software.

// Viewmodel
viewmodel_fov "64"
viewmodel_offset_x "1"
viewmodel_offset_y "1"
viewmodel_offset_z "-1"
cl_prefer_lefthanded "true"

// HUD
hud_scaling "1"
cl_hud_color "3"
cl_showloadout "1"
safezonex "1"
safezoney "1"

// Radar
cl_hud_radar_scale "1.11"
cl_radar_scale "0.35"
cl_radar_always_centered "0"
cl_radar_rotate "0"
cl_radar_icon_scale_min "0.6"

// Binds
bind "c" "toggle gameinstructor_enable"
bind "v" "noclip"
bind "" "toggleconsole"
bind "mwheeldown" "+jump"
bind "mwheelup" "+jump"
bind mouse5 "incrementvar cl_crosshairsize 1 4000 3997.500000"

host_writeconfig
